<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Seating Status</title>
    <script src="tailwind.js"></script>
    
    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBUDjQGysIU165XAhFnaAm1zQsQNApptAU",
            authDomain: "examflow-india.firebaseapp.com",
            projectId: "examflow-india",
            storageBucket: "examflow-india.firebasestorage.app",
            messagingSenderId: "1044362923869",
            appId: "1:1044362923869:web:0f05d9dd0ec21b51df22b4",
            measurementId: "G-Z9PLLX3673"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
      //  window.firebase = { db, doc, getDoc }; 

        const urlParams = new URLSearchParams(window.location.search);
        let collegeId = urlParams.get('id');

        if (collegeId && collegeId.includes('/')) {
            const parts = collegeId.split('/');
            collegeId = parts[parts.length - 1]; 
        }

        let allSessions = []; 
        let roomConfigs = {};
        let collegeName = "Exam Centre";
        let sessionCache = {}; 
        let indexCache = null; 
        let activeIntervals = [];
        const CACHE_KEY_INDEX = "seating_index_cache";
        const CACHE_KEY_SESSIONS = "seating_sessions_data";



               async function loadData() {
            const statusEl = document.getElementById('status');
            if (!collegeId) {
                statusEl.innerHTML = `<span class="text-red-500">Error: Invalid Link. Please contact office.</span>`;
                return;
            }

            statusEl.textContent = "Loading Live Exam Data...";
            
            try {
                                let networkTimeAtLoad = null;
                let performanceAtLoad = performance.now();

                const timeSources = [
                    async () => {
                        const resp = await fetch(window.location.href, { method: 'HEAD' });
                        const dateStr = resp.headers.get('Date');
                        return dateStr ? new Date(dateStr).getTime() : null;
                    },
                    async () => {
                        const resp = await fetch('https://timeapi.io/api/Time/current/zone?timeZone=Asia/Kolkata');
                        const data = await resp.json();
                        return new Date(data.dateTime).getTime();
                    },
                    async () => {
                        const resp = await fetch('https://worldtimeapi.org/api/timezone/Asia/Kolkata');
                        const data = await resp.json();
                        return new Date(data.datetime).getTime();
                    }
                ];

                for (let getSourceTime of timeSources) {
                    try {
                        const time = await getSourceTime();
                        if (time) {
                            networkTimeAtLoad = time;
                            performanceAtLoad = performance.now();
                            console.log("🕒 Time Synced successfully.");
                            break; 
                        }
                    } catch (e) { console.warn("A time source failed, trying next..."); }
                }

                window.getExamsNow = () => {
                    if (networkTimeAtLoad) {
                        const elapsedSinceSync = performance.now() - performanceAtLoad;
                        return new Date(networkTimeAtLoad + elapsedSinceSync);
                    }
                    return new Date(); 
                };



                // ⚡ Check Local Cache for Index (Cost Saver)
                const cachedIndex = JSON.parse(localStorage.getItem(CACHE_KEY_INDEX));
                const now = Date.now();

               if (cachedIndex && (now - cachedIndex.timestamp < 600000)) { 
                    indexCache = cachedIndex.data;
                    collegeName = indexCache.collegeName || "Exam Centre";
                    document.getElementById('college-name').textContent = collegeName;
                    console.log("⚡ Index loaded from cache");
                } else {
                    const indexSnap = await getDoc(doc(db, 'public_seating', collegeId));
                    if (indexSnap.exists()) {
                        indexCache = indexSnap.data();
                        localStorage.setItem(CACHE_KEY_INDEX, JSON.stringify({ timestamp: now, data: indexCache }));
                        collegeName = indexCache.collegeName || "Exam Centre";
                        document.getElementById('college-name').textContent = collegeName;
                    }
                }

                // --- 🛡️ UI LOCK GATE: Check if there are ANY exams today ---
                const nowTotal = window.getExamsNow ? window.getExamsNow() : new Date();
                const todayStr = `${String(nowTotal.getDate()).padStart(2, '0')}.${String(nowTotal.getMonth() + 1).padStart(2, '0')}.${nowTotal.getFullYear()}`;
                
                const sessionsObj = indexCache ? (indexCache.sessions || {}) : {};
                const hasExamsToday = Object.keys(sessionsObj).some(key => key.startsWith(todayStr));

                if (!hasExamsToday) {
                    statusEl.innerHTML = `<span class="bg-gray-100 text-gray-700 px-4 py-2 rounded-full font-bold text-sm border border-gray-200">No Exams Scheduled Today</span>`;
                    // 🛑 Abort instantly. The search box remains universally hidden.
                    return; 
                }
                // -----------------------------------------------------------

                statusEl.textContent = ""; 
                document.getElementById('search-section').classList.remove('hidden');

                const savedRegNo = localStorage.getItem('myExamRegNo');
                if (savedRegNo) {

                    // Populate the box with their saved number
                    document.getElementById('reg-input').value = savedRegNo;
                    // 🚀 Auto-Trigger the search immediately upon load
                    setTimeout(() => searchStudent(), 100);
                }
            } catch (error) {

                console.error("Load Error:", error);
                statusEl.textContent = "Minimal mode active.";
            }
            // 🛠️ Debug Tool: Make vars visible to console
            window.indexCache = indexCache;
            window.allSessions = allSessions;
        }



  window.searchStudent = async function() {
      // Reset session memory so we can re-check the 45-minute gate
      allSessions = []; 
      activeIntervals.forEach(clearInterval);
      activeIntervals = [];

            const regInput = document.getElementById('reg-input');
            const regNo = regInput.value.trim().toUpperCase();
            const resultContainer = document.getElementById('result-container');
            const statusEl = document.getElementById('status');
            resultContainer.innerHTML = '';
            
            if (regNo.length < 2) {
                alert("Please enter a valid Register Number.");
                return;
            }

            // 💾 UNCONDITIONAL SAVE: Lock it in memory immediately, even on holidays
            localStorage.setItem('myExamRegNo', regNo);

            // --- ⚡ LAZY LOAD TODAY'S DATA (Only when Find is clicked) ---
            // 🛡️ SECURITY FIX: Base "Today" entirely on network time, not the phone's manipulable clock.
            const nowTotal = window.getExamsNow ? window.getExamsNow() : new Date();
            const todayString = `${String(nowTotal.getDate()).padStart(2, '0')}.${String(nowTotal.getMonth() + 1).padStart(2, '0')}.${nowTotal.getFullYear()}`;         
            if (allSessions.length === 0 && indexCache) {
    statusEl.textContent = "Verifying sessions...";
    const sessions = indexCache.sessions || {};
    const now = window.getExamsNow ? window.getExamsNow() : new Date();

    for (const [label, sInfo] of Object.entries(sessions)) {
        if (!label.startsWith(todayString)) continue;

        const [dPart, tPart] = label.split(' | ');
        const sessionTime = parseSessionTime(dPart.trim(), tPart.trim());
        const unlockTime = new Date(sessionTime.getTime() - (45 * 60 * 1000));

        // SECURITY GATE: Only fetch document if within 45 minutes
        if (now >= unlockTime) {
            const docId = sInfo.docId;
            const LS_KEY = `seating_payload_${docId}`;
            const lsCache = JSON.parse(localStorage.getItem(LS_KEY));
            const serverUpdated = sInfo.lastUpdated || 0;

            // 🛡️ SMART CACHE: Check if phone cache exists AND is newer than Admin's last edit
            if (!sessionCache[docId]) {
                if (lsCache && lsCache.timestamp > serverUpdated) {
                    sessionCache[docId] = lsCache.data;
                } else {
                    const sSnap = await getDoc(doc(db, 'public_seating', docId));
                    if (sSnap.exists()) {
                        sessionCache[docId] = sSnap.data();
                        localStorage.setItem(LS_KEY, JSON.stringify({
                            timestamp: Date.now(),
                            data: sessionCache[docId]
                        }));
                    }
                }
            }
            const d = sessionCache[docId];

            if (d) {
                allSessions.push({
                    date: dPart.trim(), time: tPart.trim(),
                    studentMap: d.students || {} // Store flat map for instant lookup
                });
            }

        } else {
            // Add minimal locked info to show the countdown but NO room data
            allSessions.push({ date: dPart.trim(), time: tPart.trim(), isLockedByGate: true, fullDate: sessionTime });
        }
    }
    statusEl.textContent = "";
}


            let studentName = "";
            let myExams = [];
            // 🛡️ SECURITY FIX: Calculate midnight strictly based on network "today" in IST.
            const todayMidnight = parseSessionTime(todayString, "00:00 AM");

            allSessions.forEach(session => {
                const dateStr = session.date;
                const timeStr = session.time;
                const examDayStart = parseSessionTime(dateStr, "00:00 AM");
                if (examDayStart < todayMidnight) return;

                let studentRecord = null;
                let studentRoom = "Not Allotted";
                let seatNumber = "-";
                let isScribeRoom = false;

            // ⚡ INSTANT LOOKUP (Cost-Effective)
                if (session.studentMap && session.studentMap[regNo]) {
                    studentRecord = session.studentMap[regNo];
                    studentRoom = studentRecord.room;
                    seatNumber = studentRecord.seat;
                }

                if (session.scribeAllotment && session.scribeAllotment[regNo]) {
                    studentRoom = session.scribeAllotment[regNo];
                    isScribeRoom = true;
                    seatNumber = "Scribe";
                }
if (session.isLockedByGate) {
    // Show locked state for sessions we haven't even downloaded yet
    myExams.push({
        dateStr: session.date, timeStr: session.time, fullDate: session.fullDate,
        isLockedByGate: true, 
        paperName: "Available 45m before exam" 
    });
} else if (studentRecord && studentRoom !== "Not Allotted") {

                    if (!studentName) studentName = studentRecord.name || "";
                    myExams.push({
                        dateStr, timeStr, studentRoom, seatNumber,
                        paperName: studentRecord.course || "", 
                        isScribeRoom,
                        fullDate: parseSessionTime(dateStr, timeStr)
                    });

                }
            });

            myExams.sort((a, b) => a.fullDate - b.fullDate);

            if (myExams.length > 0) {
                localStorage.setItem('myExamRegNo', regNo);
                const now = window.getExamsNow ? window.getExamsNow() : new Date();
                myExams.forEach(exam => {
                    const unlockTime = new Date(exam.fullDate.getTime() - (45 * 60 * 1000));
                    const scribeTag = exam.isScribeRoom ? `<span class="bg-orange-100 text-orange-700 text-[10px] px-2 py-0.5 rounded border border-orange-200 font-bold ml-2 uppercase">Scribe Room</span>` : "";
                    const card = document.createElement('div');
                    card.className = "bg-white p-5 rounded-xl shadow-lg border border-gray-100 mb-5 animate-fade-in";
                    let content = `
                        <div class="border-b border-gray-200 pb-3 mb-3">
                            <div class="text-center mb-3">
                                <div class="text-lg font-black text-gray-800 leading-tight">${studentName}</div>
                                <div class="text-xs font-bold text-indigo-500 font-mono">${regNo}</div>
                            </div>
                            <div class="bg-blue-50 border border-blue-100 p-3 rounded-lg mb-3">
                                <div class="text-[10px] text-blue-400 uppercase font-bold tracking-wider mb-1">Subject / Paper</div>
                                <div class="text-sm font-bold text-blue-900 leading-snug">${exam.paperName}</div>
                            </div>
                            <div class="flex justify-between items-center bg-gray-50 p-2 rounded-lg">
                                <div class="flex flex-col"><span class="text-[10px] text-gray-500 uppercase font-bold">Date</span><span class="font-bold text-gray-800 text-sm">${exam.dateStr}</span></div>
                                <div class="flex flex-col text-right"><span class="text-[10px] text-gray-500 uppercase font-bold">Time</span><span class="font-bold text-indigo-600 text-sm">${exam.timeStr}</span></div>
                            </div>
                        </div>`;
                    if (now >= unlockTime) {
                        content += `
                            <div class="text-center py-2">
                                <p class="text-xs text-gray-400 uppercase tracking-widest font-bold mb-2 flex items-center justify-center">Allotted Hall ${scribeTag}</p>
                                <div class="text-2xl font-black text-gray-900 leading-tight mb-5 px-2">${exam.studentRoom}</div>
                                <div class="inline-block bg-indigo-50 rounded-xl px-8 py-4 border border-indigo-100 shadow-inner">
                                     <span class="block text-[10px] text-indigo-400 uppercase font-bold tracking-wider mb-1">Your Seat Number</span>
                                     <span class="block text-5xl font-black text-indigo-600">${exam.seatNumber === "Scribe" ? "Spl" : "#" + exam.seatNumber}</span>
                                </div>
                                <p class="text-[10px] text-green-600 mt-5 font-bold flex items-center justify-center gap-1.5 uppercase tracking-wide">Seating Live</p>
                            </div>`;
                        } else {
                        const timerId = `timer-${myExams.indexOf(exam)}`;
                        content += `
                            <div class="text-center py-6 bg-gray-50 rounded-lg border border-gray-100">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-10 h-10 text-gray-400 mx-auto mb-3"><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25 2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z" /></svg>
                                <p class="text-sm text-gray-700 font-bold">Seating Info Locked</p>
                                <p class="text-xs text-gray-500 mt-1">Reveals in <span id="${timerId}" class="font-mono font-bold text-red-500 bg-red-50 px-1 rounded border border-red-100">--:--</span></p>
                                <p class="text-[10px] text-gray-400 mt-2">(Available 45m before exam)</p>
                            </div>`;
                        
                          const interval = setInterval(() => {
                              const nowTick = window.getExamsNow();
                              const diff = unlockTime - nowTick;

                              // 🕵️‍♂️ CHEAT DETECTION: Check for artificial clock manipulation (Forward OR Backward)
                              const el = document.getElementById(timerId);
                              if (el && (Math.abs(Date.now() - nowTick.getTime()) > 300000)) { // 5+ mins deviation
                                  const cardEl = el.parentElement.parentElement;
                                  if (!cardEl.querySelector('.cheat-warning')) {
                                      const warning = document.createElement('div');
                                      warning.className = "cheat-warning mt-3 mx-4 p-2 bg-yellow-50 border border-yellow-300 rounded-lg text-xs text-yellow-800 font-medium shadow-sm animate-pulse";
                                      warning.innerHTML = "⏳ <b>Nice try, Time Traveler!</b><br>Changing your phone's clock won't unlock the gate early! 😉";
                                      cardEl.appendChild(warning);
                                  }
                              } else if (el) {
                                  // Remove warning if they fix their clock
                                  const warning = el.parentElement.parentElement.querySelector('.cheat-warning');
                                  if (warning) warning.remove();
                              }

                              if (diff <= 0) {
                                  clearInterval(interval);
                                  // Ask the student to reveal the data
                                  const el = document.getElementById(timerId);
                                  if (el) {
                                      el.parentElement.innerHTML = '<button onclick="searchStudent()"class="bg-green-600 text-white px-4 py-1 rounded-full text-xs font-bold animate-bounce shadow-lg">REVEAL SEATING NOW</button>';
                                  }
                              } else {
                                const el = document.getElementById(timerId);
                                if (el) {
                                    const mins = Math.floor(diff / 60000);
                                    const secs = Math.floor((diff % 60000) / 1000);
                                    el.textContent = `${mins}m ${secs}s`;
                                }
                            }
                        }, 1000);
                        activeIntervals.push(interval);
                    }

                    card.innerHTML = content;
                    resultContainer.appendChild(card);
                });
            } else {
                resultContainer.innerHTML = `<div class="text-center py-8 bg-white rounded-lg shadow-sm border border-gray-200"><p class="text-gray-800 font-bold text-lg">No Upcoming Exams</p><p class="text-gray-500 text-sm mt-1">Status: Past/Unassigned</p></div>`;
            }

            const clearBtn = document.createElement('div');
            clearBtn.innerHTML = `<button onclick="clearSavedData()" class="text-xs text-gray-400 underline mt-6 hover:text-gray-600 transition">Clear & Search</button>`;
            clearBtn.className = "text-center";
            resultContainer.appendChild(clearBtn);
        };


        window.clearSavedData = function() {
            localStorage.removeItem('myExamRegNo');
            document.getElementById('reg-input').value = '';
            document.getElementById('result-container').innerHTML = '';
            document.getElementById('reg-input').focus();
        };

function parseSessionTime(dateStr, timeStr) {
    try {
        const [d, m, y] = dateStr.split('.').map(Number);
        let [time, modifier] = timeStr.split(' ');
        let [hours, minutes] = time.split(':').map(Number);
        
        if (modifier === 'PM' && hours < 12) hours += 12;
        if (modifier === 'AM' && hours === 12) hours = 0;
        
        // 🛡️ SECURITY FIX: Force IST (+05:30) so timezone manipulation fails
        const isoString = `${y}-${String(m).padStart(2, '0')}-${String(d).padStart(2, '0')}T${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:00+05:30`;
        return new Date(isoString);
    } catch(e) { 
        console.error("Time Parse Error:", e);
        return new Date(); 
    }
  }

          // --- 🕒 REAL-TIME NETWORK CLOCK UPDATER (IST + AM/PM) ---
          function startNetworkClock() {
              const clockEl = document.getElementById('network-clock');
              const dateEl = document.getElementById('network-date');

              setInterval(() => {
                  const now = window.getExamsNow ? window.getExamsNow() : new Date();

                  // Force Indian Standard Time (IST) with 12-hour AM/PM format
                  const timeOptions = {
                      timeZone: 'Asia/Kolkata',
                      hour12: true,
                      hour: '2-digit',
                      minute: '2-digit',
                      second: '2-digit'
                  };
                  const dateOptions = {
                      timeZone: 'Asia/Kolkata',
                      day: '2-digit',
                      month: 'short',
                      year: 'numeric'
                  };

                  // Use 'en-US' for the time string to ensure AM/PM is formatted correctly
                  clockEl.textContent = now.toLocaleTimeString('en-US', timeOptions);
                  dateEl.textContent = now.toLocaleDateString('en-GB', dateOptions).replace(/,/g, '');
              }, 1000);
          }

          // 🛡️ CAPTCHA GATE: Only bypass if already verified this session
          let captchaAnswer = 0;

          function showCaptcha() {
              const a = Math.floor(Math.random() * 9) + 1;
              const b = Math.floor(Math.random() * 9) + 1;
              captchaAnswer = a + b;
              document.getElementById('captcha-question').textContent = `${a} + ${b} = ?`;
              document.getElementById('captcha-gate').classList.remove('hidden');
          }

          window.verifyCaptcha = function() {
              const val = parseInt(document.getElementById('captcha-input').value);
              if (val === captchaAnswer) {
                  localStorage.setItem('captchaVerified', Date.now().toString());
                  document.getElementById('captcha-gate').classList.add('hidden');
                  loadData();
              } else {
                  document.getElementById('captcha-error').classList.remove('hidden');
                  document.getElementById('captcha-input').value = '';
                  // Regenerate question to prevent brute force
                  const a = Math.floor(Math.random() * 9) + 1;
                  const b = Math.floor(Math.random() * 9) + 1;
                  captchaAnswer = a + b;
                  document.getElementById('captcha-question').textContent = `${a} + ${b} = ?`;
              }
          };

          // Allow Enter key to submit CAPTCHA
          document.getElementById('captcha-input')?.addEventListener('keydown', e => {
              if (e.key === 'Enter') verifyCaptcha();
          });

          const captchaTs = parseInt(localStorage.getItem('captchaVerified') || '0');
            if (Date.now() - captchaTs < 24 * 60 * 60 * 1000) { // 24 hours
              loadData(); // Already verified this session — skip CAPTCHA
          } else {
              showCaptcha(); // First visit — show CAPTCHA before any Firebase reads
          }
          startNetworkClock();
    </script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col items-center p-4 font-sans">
    <div class="w-full max-w-md">
        <div class="text-center mb-6 mt-2">
            <!-- 🎓 College Logo Loading directly from your root directory -->
            <img src="./CollegeLogo2.png" alt="College Logo" class="h-24 w-auto mx-auto mb-4 drop-shadow-md rounded-lg">
            
            <h1 class="text-xl font-black text-gray-900 tracking-tight" id="college-name">Exam Centre</h1>

      <p class="text-xs font-bold text-indigo-600 uppercase tracking-widest mt-1">Student Seating Portal</p>   

      <!-- 🕒 Network Clock Display -->
      <div id="network-clock-panel" class="mt-4 flex justify-center">
          <div class="inline-flex flex-col items-center bg-white px-6 py-2 rounded-xl shadow-sm border
  border-gray-100">
              <span class="text-[9px] font-bold text-gray-400 uppercase tracking-widest mb-1">Standard Network 
  Time</span>
              <div id="network-clock" class="text-lg font-mono font-black text-gray-800 tabular-nums
  leading-none">--:--:-- --</div>
              <div id="network-date" class="text-[9px] font-bold text-indigo-400 mt-1
  uppercase">Loading...</div>
          </div>
      </div>
  </div>

  <div id="status" class="text-center text-sm font-medium text-indigo-600 mb-2 animate-pulse"></div>
  <!-- 🛡️ Bot CAPTCHA Gate (shown once per browser session) -->
  <div id="captcha-gate" class="hidden bg-white p-6 rounded-2xl shadow-xl border border-indigo-100 mb-4 text-center">
    <p class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-3">Quick Verification</p>
    <p class="text-sm font-bold text-gray-700 mb-4">Solve to continue: <span id="captcha-question" class="text-indigo-600 font-black text-base"></span></p>
    <div class="flex gap-2 justify-center">
      <input type="number" id="captcha-input" class="w-24 p-2 border border-gray-200 rounded-xl text-center text-lg font-bold focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="?">
      <button onclick="verifyCaptcha()" class="bg-indigo-600 text-white px-5 py-2 rounded-xl font-bold hover:bg-indigo-700 transition shadow-md">Go</button>
    </div>
    <p id="captcha-error" class="text-red-500 text-xs mt-2 font-bold hidden">Wrong answer. Try again!</p>
  </div>



            

        <div id="search-section" class="hidden bg-white p-6 rounded-2xl shadow-xl shadow-indigo-50 border border-indigo-100">
            <label class="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-2">Enter Register Number</label>
            <div class="flex gap-2">
                <input type="text" id="reg-input" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:bg-white focus:border-indigo-500 outline-none uppercase font-mono text-lg font-bold text-gray-800 placeholder-gray-300 transition-all" placeholder="e.g. ABCDE123">
                <button onclick="searchStudent()" class="bg-indigo-600 text-white px-5 rounded-xl font-bold hover:bg-indigo-700 transition-colors shadow-lg shadow-indigo-200 active:scale-95">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-6 h-6">
                      <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
                    </svg>
                </button>
            </div>
        </div>

        <div id="result-container" class="mt-8 space-y-4"></div>
        
        <p class="text-center text-[10px] text-gray-300 mt-12 font-medium">Powered by ExamFlow</p>
    </div>
</body>
